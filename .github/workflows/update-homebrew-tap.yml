name: update-homebrew-tap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to homebrew-tap, for example v0.0.1"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "tag input is required" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update source formula in Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${TAP_GITHUB_TOKEN:-}" ]; then
            echo "TAP_GITHUB_TOKEN is required to update walavave/homebrew-tap" >&2
            exit 1
          fi

          SOURCE_URL="https://github.com/walavave/trash-cli/archive/refs/tags/${TAG}.tar.gz"
          SHA256="$(curl -fsSL "$SOURCE_URL" | sha256sum | awk '{print $1}')"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/walavave/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/trash-cli.rb <<EOF
          class TrashCli < Formula
            desc "Native macOS trash CLI implemented in Rust"
            homepage "https://github.com/walavave/trash-cli"
            url "${SOURCE_URL}"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", "--locked", *std_cargo_args(path: ".")
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/trash --version")
            end
          end
          EOF

          cd tap
          git config user.name goreleaserbot
          git config user.email bot@goreleaser.com

          if git diff --quiet -- Formula/trash-cli.rb; then
            echo "Formula/trash-cli.rb is already up to date"
            exit 0
          fi

          git add Formula/trash-cli.rb
          git commit -m "Brew formula update for trash-cli ${TAG}"
          git push origin HEAD:main
